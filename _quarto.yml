project:
  type: book
  output-dir: _book

website:
  favicon: assets/UNACH.png
  reader-mode: true
  search:
    location: sidebar
    type: overlay
  comments:
    hypothesis: true

book:
  title: "Aproximación numerica de la solucion para ecuaciones diferenciales estocasticas con saltos"
  language: es
  date: "09/03/2026"
  output-file: "Tesis_Maestria_MDL"
  image: assets/UNACH.png
  cover-image: assets/logofcfm.png
  sharing: [twitter, facebook]
  downloads: [pdf, epub]
  favicon: assets/UNACH.png
  sidebar:
    logo: assets/UNACH.png
    style: floating
    collapse-level: 2
    border: true
    search: true
  open-graph: true
  twitter-card: true
  repo-url: https://github.com/Mara-DL/Tesis_Maestria
  repo-actions: [edit, issue, source]
  page-navigation: true

  chapters:
  - index.qmd
  #- fundamentos-estocasticos.qmd
  #- 02-edes-saltos.qmd
  #- 03-metodos-numericos.qmd
  #- 04-modelo-actuarial.qmd
  #- 05-resultados-simulacion.qmd
  #- 06-conclusiones.qmd
  - intro.qmd
  - references.qmd
  - summary.qmd
comments:
  hypothesis: true

bibliography: references.bib

format:
  html:
    theme:
      dark: darkly
      light: cerulean
    highlight-style: a11y
    lang: es
    html-math-method: mathjax
    grid:
      sidebar-width: 300px
      body-width: 900px
      margin-width: 300px
      gutter-width: 1.5rem
    code-copy: true
    code-fold: true
    toc-location: right

  pdf:
    lang: es
    include-in-header:
      - packa.tex
    template-partials:
      - before-body.tex
    documentclass: scrreprt
    papersize: us-letter
    titlegraphic: assets/UNACH.png
    institution: Universidad Autónoma de Chiapas
    email: x180099@unach.mx
    keep-tex: true

  epub:
    cover-image: assets/UNACH.png

editor: visual