project:
  type: book
  output-dir: _book

website:
  favicon: assets/UNACH.png
  reader-mode: true
  search:
    location: sidebar
    type: overlay
  comments:
    hypothesis: true

book:
  title: "Aproximación numerica de la solucion para ecuaciones diferenciales estocasticas con saltos"
  language: es
  date: "09/03/2026"
  output-file: "Tesis_Maestria_MDL"
  image: assets/UNACH.png
  sharing: [twitter, facebook]
  downloads: [pdf, epub]
  favicon: assets/UNACH.png
  sidebar:
    logo: assets/UNACH.png
    style: floating
    collapse-level: 2
    border: true
    search: true
  open-graph: true
  twitter-card: true
  repo-url: https://github.com/Mara-DL/Tesis_Maestria
  repo-actions: [edit, issue, source]
  page-navigation: true

  chapters:
    - index.qmd
    - intro.qmd
    - fundamentos_estocasticos.qmd
    - edes_saltos.qmd
    - metodos-numericos.qmd
    - modelo-actuarial.qmd
    - resultados_simulacion.qmd
    - conclusiones.qmd
    - references.qmd
comments:
  hypothesis: true

bibliography: references.bib

format:
  html:
    theme:
      dark: darkly
      light: cerulean
    highlight-style: a11y
    lang: es
    html-math-method: mathjax
    grid:
      sidebar-width: 300px
      body-width: 900px
      margin-width: 300px
      gutter-width: 1.5rem

  pdf:
    lang: es
    include-in-header:
      - packa.tex
    template-partials:
      - before-body.tex
    documentclass: scrreprt
    papersize: us-letter
    titlegraphic: assets/UNACH.png
    institution: Universidad Autónoma de Chiapas
    email: x180099@unach.mx
    keep-tex: true

  epub:
    cover-image: assets/UNACH.png

# === SECCIÓN DE PUBLICACIÓN ===
publish:
  - id: github-pages
    type: gh-pages
    branch: gh-pages
    repo: Mara-DL/Tesis_Maestria

editor: visual